<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulados - 8º Ano (AP1)</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.4);
            --accent-ciencias: #10b981;
            --accent-geografia: #f59e0b;
            --accent-historia: #8b5cf6;
            --accent-matematica: #3b82f6;
            --accent-portugues: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #4b5563;
            font-weight: 400;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }

        .card.ciencias::before { background: var(--accent-ciencias); }
        .card.geografia::before { background: var(--accent-geografia); }
        .card.historia::before { background: var(--accent-historia); }
        .card.matematica::before { background: var(--accent-matematica); }
        .card.portugues::before { background: var(--accent-portugues); }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .icon {
            width: 32px;
            height: 32px;
        }

        .card.ciencias .card-title { color: var(--accent-ciencias); }
        .card.geografia .card-title { color: var(--accent-geografia); }
        .card.historia .card-title { color: var(--accent-historia); }
        .card.matematica .card-title { color: var(--accent-matematica); }
        .card.portugues .card-title { color: var(--accent-portugues); }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex-grow: 1;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 0.75rem;
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: #ffffff;
            border-color: #d1d5db;
            color: #111827;
            transform: translateX(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .link-item::before {
            content: '→';
            margin-right: 0.75rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.2s ease;
            color: #6b7280;
        }

        .link-item:hover::before {
            opacity: 1;
            transform: translateX(0);
        }
        
        footer {
            margin-top: auto;
            padding-top: 4rem;
            color: #9ca3af;
            font-size: 0.95rem;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.2rem; }
            .container { grid-template-columns: 1fr; }
        }

    </style>
</head>
<body>

            <div class="links">
                <a href="port-1.html" class="link-item">Simulado 1</a>

        </div>
    </div>

    <footer>

</html>
